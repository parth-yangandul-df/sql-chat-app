services:
  # App metadata database — PostgreSQL 16 with pgvector extension
  app-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: saras_metadata
      POSTGRES_USER: parthy
      POSTGRES_PASSWORD: "querywise_app"
    ports:
      - "5434:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parthy -d saras_metadata"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the Docker app-db container
      DATABASE_URL: "postgresql+asyncpg://parthy:querywise_app@app-db:5432/saras_metadata"
      ENVIRONMENT: development
      PYTHONPATH: /app
      # OLLAMA_BASE_URL from .env = http://host.docker.internal:11434 (native Ollama on your machine)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      app-db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "false"
      WATCHPACK_POLLING: "false"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  chatbot-frontend:
    build:
      context: ./chatbot-frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./chatbot-frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  app_db_data:

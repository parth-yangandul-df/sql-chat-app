[mypy]
python_version = 3.12
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False

[mypy-pgvector.*]
ignore_missing_imports = True

[mypy-aioodbc.*]
ignore_missing_imports = True

[mypy-pyodbc.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-app.db.models.schema_cache]
ignore_errors = True

[mypy-app.db.models.glossary]
ignore_errors = True

[mypy-app.db.models.metric]
ignore_errors = True

[mypy-app.db.models.sample_query]
ignore_errors = True

[mypy-app.db.models.knowledge]
ignore_errors = True

[mypy-app.config]
ignore_errors = True